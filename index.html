<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>통합 관리 도구</title>
  <style>
    :root {
      --bg: #1a1a1b;
      --card: #2c2c2e;
      --accent: #ffca28;
      --text: #e8eaed;
      --border: #444;
      --btn-bg: #3a3a3c;
      --point: #00e676;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Malgun Gothic', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* --- 탭 메뉴 스타일 --- */
    .tab-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 1100px;
    }

    .tab-link {
      width: 150px;
      height: 40px;
      background: var(--card);
      border: 1px solid var(--border);
      color: #aaa;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tab-link.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .tab-panel {
      display: none;
      width: 100%;
      justify-content: center;
    }

    .tab-panel.active {
      display: flex;
    }

    /* --- 비욘드 & 겁화 레이아웃 --- */
    .beyond-wrapper {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
    }

    .beyond-container {
      background-color: var(--card);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
      width: 480px;
    }

    .beyond-header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      position: relative;
    }

    .section-title {
      font-size: 14px;
      color: var(--accent);
      font-weight: bold;
      margin: 15px 0 10px 0;
      border-left: 3px solid var(--accent);
      padding-left: 8px;
    }

    .btn-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 15px;
      background: #333;
      padding: 10px;
      border-radius: 8px;
    }

    .select-btn {
      flex: 1;
      padding: 10px;
      border: 1px solid #555;
      background: var(--btn-bg);
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      text-align: center !important;
    }

    .select-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* --- 입력 필드 공통 --- */
    .input-group {
      display: grid;
      grid-template-columns: 105px 1fr 40px;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .input-group.simple {
      grid-template-columns: 90px 300px;
      gap: 10px;
    }

    input {
      background: #3a3a3c;
      border: 1px solid #555;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    /* 전란의 겁화 계산기 내 입력 필드 우측 정렬 */
    #fire-calc-area input {
      text-align: right;
    }

    input:focus {
      border-color: var(--accent);
    }

    .ticket-area {
      display: grid;
      grid-template-columns: repeat(2, 188px);
      gap: 12px;
      background: #252526;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      justify-content: center;
    }

    .ticket-area input {
      width: 100%;
      height: 34px;
      box-sizing: border-box;
      text-align: center !important;
      padding: 0;
    }

    /* --- 결과 및 게이지 --- */
    .result-box {
      margin-top: 20px;
      background: #1a1a1b;
      padding: 15px;
      border-radius: 8px;
      border-left: 5px solid var(--accent);
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .progress-container {
      background: #444;
      height: 10px;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
    }

    #progress-bar {
      background: linear-gradient(90deg, #ffca28, #ffa000);
      height: 100%;
      width: 0%;
      transition: 0.5s;
    }

    .template-output {
      background: #3a3a3c;
      color: var(--accent);
      padding: 15px;
      border-radius: 8px;
      font-family: 'Consolas', monospace;
      font-size: 13px;
      white-space: pre-wrap;
      margin-top: 15px;
      border: 1px solid #222;
      min-height: 80px;
    }

    .btn-main {
      width: 100%;
      margin-top: 10px;
      background: var(--accent);
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: #000;
      font-size: 16px;
    }

    /* --- 보석 매입 스타일 --- */
    .gem-container {
      background: var(--card);
      padding: 25px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 680px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .gem-header {
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 20px;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      padding-right: 10px;
    }

    .config-area {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
      margin-left: auto;
    }

    .config-area label {
      font-size: 12px;
      font-weight: bold;
      color: #aaa;
    }

    .config-area input {
      background: #1a1a1b;
      border: 1px solid #555;
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      text-align: right;
      width: 80px;
      outline: none;
      font-weight: bold;
      font-size: 13px;
    }

    .card-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .card-table th {
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding: 10px 5px;
      text-align: center;
    }

    .card-table td {
      padding: 8px 2px;
      border-bottom: 1px solid #38383a;
      text-align: center;
    }

    .row-name {
      font-weight: bold;
      color: #aaa;
      width: 70px;
      text-align: center !important;
    }

    .input-cell input {
      width: 50px;
      background: var(--btn-bg);
      border: 1px solid #555;
      color: #fff;
      padding: 5px;
      border-radius: 4px;
      text-align: center;
      outline: none;
    }

    .row-total {
      text-align: center !important;
      font-weight: bold;
      color: var(--accent);
      width: 130px;
    }

    .summary-area {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .result-footer {
      background: #1a1a1b;
      padding: 15px;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .border-accent {
      border-left: 5px solid var(--accent);
    }

    .border-point {
      border-left: 5px solid var(--point);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 13px;
      font-weight: bold;
    }

    .total-value {
      font-size: 18px;
      font-weight: bold;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="tab-nav">
    <div class="tab-link active" onclick="showTab('beyond-pane', this)">🔥비욘드&겁화</div>
    <div class="tab-link" onclick="showTab('gem-pane', this)">💎 보석 계산기</div>
  </div>

  <div id="beyond-pane" class="tab-panel active">
    <div class="beyond-wrapper">

      <div class="beyond-container" id="fire-calc-area">
        <div class="beyond-header">
          <h2 style="color:var(--accent); margin:0; font-size:22px;">전란의 겁화 계산기</h2>
          <button style="position:absolute; right:0; bottom:10px; background:#444; color:#ccc; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; font-size:11px;" onclick="resetFire()">초기화</button>
        </div>

        <div class="section-title">목표 겁화 설정</div>
        <div class="btn-selector" id="fire-goal-group">
          <button class="select-btn active" data-value="500" onclick="setFireGoal(500)">500개</button>
          <button class="select-btn" data-value="1000" onclick="setFireGoal(1000)">1000개</button>
        </div>

        <div class="section-title">현재 자산</div>
        <div class="input-group">
          <label>보유 겁화</label>
          <input type="number" id="f-item" class="watch-fire" value="0">
          <span>개</span>
        </div>
        <div class="input-group">
          <label>보유 불씨</label>
          <input type="number" id="f-ember" class="watch-fire" value="0" style="color:var(--accent);">
          <span>개</span>
        </div>
        <div class="input-group">
          <label>하급 시세</label>
          <input type="number" id="f-price" class="watch-fire" value="550000" step="50000">
          <span>미파</span>
        </div>

        <div class="section-title">보유 중인 결정석</div>
        <div class="input-group"><label>하급 결정석</label><input type="number" id="c1" class="watch-fire" value="0"><span>개</span></div>
        <div class="input-group"><label>중급 결정석</label><input type="number" id="c2" class="watch-fire" value="0"><span>개</span></div>
        <div class="input-group"><label>상급 결정석</label><input type="number" id="c3" class="watch-fire" value="0"><span>개</span></div>
        <div class="input-group"><label>특급 결정석</label><input type="number" id="c4" class="watch-fire" value="0"><span>개</span></div>
        <div class="input-group"><label>불멸 결정석</label><input type="number" id="c5" class="watch-fire" value="0"><span>개</span></div>

        <div class="result-box">
          <div class="result-item">
            <span>✨ 예상 합계(결정석 포함):</span>
            <span id="res-total" style="color:var(--accent); font-weight:bold;">0 / 500</span>
          </div>
          <div class="result-item">
            <span>💰 부족분 구매 비용:</span>
            <span id="res-gold" style="color:#00e676; font-weight:bold;">0 G</span>
          </div>
          <hr style="border:0; border-top:1px dashed #444; margin:10px 0;">
          <div class="result-item">
            <span>💎 부족한 겁화:</span>
            <span id="res-item-gap" style="color:#ff5252; font-weight:bold;">0 개</span>
          </div>
          <div class="result-item">
            <span>🔥 부족한 불씨:</span>
            <span id="res-gap" style="color:#ff5252; font-weight:bold;">0 개</span>
          </div>
          <div id="res-info" style="font-size:12px; color:#aaa; margin-top:8px; line-height:1.5;"></div>
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
        </div>
      </div>

      <div class="beyond-container">
        <div class="beyond-header">
          <h2 style="color:var(--accent); margin:0; font-size:22px;">비욘드 잠쩔 양식</h2>
        </div>
        <div class="section-title">티켓 및 판수 계산</div>
        <div class="ticket-area">
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <div style="font-size:12px; color:#aaa;">시작 티켓</div>
            <input type="number" id="t-start" class="watch-beyond" value="0">
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <div style="font-size:12px; color:#aaa;">획득 티켓</div>
            <input type="number" id="t-drop" class="watch-beyond" value="0">
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <div style="font-size:12px; color:#aaa;">종료 티켓</div>
            <input type="number" id="t-end" class="watch-beyond" value="0">
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <div style="font-size:12px; color:#aaa;">계산된 판수</div>
            <input type="text" id="t-result" value="0" readonly style="color:var(--accent); font-weight:bold;">
          </div>
        </div>

        <div class="section-title">설정</div>
        <div class="btn-selector" id="mode-group">
          <button class="select-btn active" data-mode="normal" onclick="setBeyondMode('normal')">노경증</button>
          <button class="select-btn" data-mode="exp" onclick="setBeyondMode('exp')">300경증</button>
        </div>

        <div class="input-group simple">
          <label>기사</label>
          <input type="text" id="seller" class="watch-beyond" value="클래식">
        </div>
        <div class="input-group simple">
          <label>승객</label>
          <input type="text" id="buyers" class="watch-beyond" value="1, 2, 3">
        </div>

        <div id="exp-fields" style="display:none; border-top: 1px dashed #555; margin-top: 12px; padding-top: 12px;">
          <div class="input-group simple"><label>시간(h)</label><input type="number" id="p-time" class="watch-beyond" value="1"></div>
          <div class="input-group simple"><label>금액</label><input type="number" id="p-price" class="watch-beyond" value="700" step="50"></div>
        </div>

        <div class="template-output" id="display"></div>
        <button class="btn-main" onclick="copyForm()">양식 복사하기</button>
      </div>
    </div>
  </div>

  <div id="gem-pane" class="tab-panel">
    <div class="gem-container">
      <div class="gem-header">
        <h2 style="color:var(--accent); margin:0; font-size:20px; padding-left:5px;">보석 매매/포인트 계산기</h2>
        <div class="config-area">
          <label>💰 기준값 설정:</label>
          <input type="number" id="base-val" value="25000" oninput="calcGem()" step="1000">
        </div>
      </div>

      <table class="card-table">
        <thead>
          <tr>
            <th>분류</th>
            <th>유니크</th>
            <th>에픽</th>
            <th>히어로</th>
            <th>미쓰</th>
            <th>레전드</th>
            <th>제타</th>
            <th>합계</th>
          </tr>
        </thead>
        <tbody id="gem-table-body"></tbody>
      </table>

      <div class="summary-area">
        <div class="result-footer border-point">
          <div class="total-row">
            <span class="total-label" style="color:var(--point)">✨ 총 포인트 합계</span>
            <span class="total-value" id="grand-point" style="color:var(--point)">0</span>
          </div>
        </div>
        <div class="result-footer border-accent">
          <div class="total-row">
            <span class="total-label" style="color:var(--accent)">💰 총 금액</span>
            <span class="total-value" id="grand-total" style="color:var(--accent)">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* --- 공통 기능: 탭 전환 --- */
    function showTab(paneId, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
      document.getElementById(paneId).classList.add('active');
      btn.classList.add('active');
    }

    /* --- 겁화 & 비욘드 로직 --- */
    let currentTargetGoal = 500;
    let currentBeyondMode = 'normal';
    const saveToLocal = (id, val) => localStorage.setItem('dual_save_' + id, val);

    function setFireGoal(val) {
      currentTargetGoal = val;
      saveToLocal('target', val);
      document.querySelectorAll('#fire-goal-group .select-btn').forEach(btn => btn.classList.toggle('active', parseInt(btn.dataset.value) === val));
      calcFire();
    }

    function setBeyondMode(mode) {
      currentBeyondMode = mode;
      saveToLocal('mode', mode);
      document.querySelectorAll('#mode-group .select-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
      updateForm();
    }

    function calcFire() {
      const ids = ['f-item', 'f-ember', 'f-price', 'c1', 'c2', 'c3', 'c4', 'c5'];
      const v = {};
      ids.forEach(id => {
        v[id] = parseInt(document.getElementById(id).value) || 0;
        saveToLocal(id, v[id]);
      });

      const pureOwned = v['f-item'];
      const fromCrystals = (v['c1'] * 1) + (v['c2'] * 3) + (v['c3'] * 5) + (v['c4'] * 10) + (v['c5'] * 30);
      const expectedTotal = pureOwned + fromCrystals;
      const itemGap = Math.max(0, currentTargetGoal - expectedTotal);
      const goldNeeded = itemGap * v['f-price'];
      const reqFireForCrystals = (v['c1'] * 30) + (v['c2'] * 40) + (v['c3'] * 50) + (v['c4'] * 60) + (v['c5'] * 70);
      const crystalFireDiff = v['f-ember'] - reqFireForCrystals;

      document.getElementById('res-total').innerText = `${expectedTotal.toLocaleString()} / ${currentTargetGoal.toLocaleString()}`;
      document.getElementById('res-gold').innerText = goldNeeded.toLocaleString();
      document.getElementById('res-item-gap').innerText = itemGap.toLocaleString() + " 개";

      const gapDisplay = document.getElementById('res-gap');
      if (crystalFireDiff >= 0) {
        gapDisplay.innerText = crystalFireDiff.toLocaleString() + " 개";
        gapDisplay.style.color = "#00e676";
        gapDisplay.previousElementSibling.innerText = "✨ 남는 불씨:";
      } else {
        gapDisplay.innerText = Math.abs(crystalFireDiff).toLocaleString() + " 개";
        gapDisplay.style.color = "#ff5252";
        gapDisplay.previousElementSibling.innerText = "🔥 교환 부족분:";
      }
      document.getElementById('progress-bar').style.width = Math.min(100, (expectedTotal / currentTargetGoal * 100)) + "%";
    }

    function updateForm() {
      const s = parseInt(document.getElementById('t-start').value) || 0;
      const e = parseInt(document.getElementById('t-end').value) || 0;
      const d = parseInt(document.getElementById('t-drop').value) || 0;
      const count = s - e + d;
      document.getElementById('t-result').value = count;

      let text = `판매자(플레이): ${document.getElementById('seller').value}\n구매자(잠수): ${document.getElementById('buyers').value}\n`;
      if (currentBeyondMode === 'normal') {
        document.getElementById('exp-fields').style.display = 'none';
        text += `금액: 판당 10\n던전 이용시간: 노경증 비욘드 ${count}판`;
      } else {
        document.getElementById('exp-fields').style.display = 'block';
        text += `금액: ${document.getElementById('p-price').value}\n던전 이용시간: 비욘드 300경증 ${document.getElementById('p-time').value}시간`;
      }
      document.getElementById('display').innerText = text;
    }

    function resetFire() {
      if (confirm("겁화 데이터를 초기화할까요?")) {
        ['f-item', 'f-ember', 'c1', 'c2', 'c3', 'c4', 'c5'].forEach(id => document.getElementById(id).value = 0);
        calcFire();
      }
    }

    function copyForm() {
      navigator.clipboard.writeText(document.getElementById('display').innerText).then(() => alert("양식이 복사되었습니다!"));
    }

    /* --- 보석 매입 로직 --- */
    const gemData = {
      '일반': [1, 3, 9, 27, 81, 243],
      '전직': [3, 9, 27, 81, 243, 729],
      '각성': [9, 27, 81, 243, 729, 2187],
      '광폭': [13, 39, 117, 351, 1053, 3159]
    };

    function initGem() {
      const tbody = document.getElementById('gem-table-body');
      Object.keys(gemData).forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="row-name">${row}</td>` +
          gemData[row].map((m, i) => `<td class="input-cell"><input type="number" class="gem-in" data-row="${row}" data-idx="${i}" value="0" oninput="calcGem()"></td>`).join('') +
          `<td class="row-total" id="gem-sum-${row}">0</td>`;
        tbody.appendChild(tr);
      });
    }

    function calcGem() {
      const base = parseInt(document.getElementById('base-val').value) || 0;
      let gTotal = 0,
        pTotal = 0;
      Object.keys(gemData).forEach(row => {
        let rowP = 0;
        document.querySelectorAll(`.gem-in[data-row="${row}"]`).forEach(input => rowP += (parseInt(input.value) || 0) * gemData[row][input.dataset.idx]);
        const rowG = rowP * base;
        document.getElementById(`gem-sum-${row}`).innerText = rowG.toLocaleString();
        gTotal += rowG;
        pTotal += rowP;
      });
      document.getElementById('grand-total').innerText = gTotal.toLocaleString();
      document.getElementById('grand-point').innerText = pTotal.toLocaleString();
    }

    /* --- 초기 실행 --- */
    window.onload = function() {
      initGem();
      const allFields = ['f-item', 'f-ember', 'f-price', 'c1', 'c2', 'c3', 'c4', 'c5', 't-start', 't-end', 't-drop', 'seller', 'buyers', 'p-time', 'p-price'];
      allFields.forEach(id => {
        const v = localStorage.getItem('dual_save_' + id);
        if (v !== null) document.getElementById(id).value = v;
      });

      const savedTarget = localStorage.getItem('dual_save_target');
      if (savedTarget) setFireGoal(parseInt(savedTarget));

      const savedMode = localStorage.getItem('dual_save_mode');
      if (savedMode) setBeyondMode(savedMode);

      document.querySelectorAll('.watch-fire').forEach(el => el.addEventListener('input', calcFire));
      document.querySelectorAll('.watch-beyond').forEach(el => el.addEventListener('input', updateForm));

      calcFire();
      updateForm();
      calcGem();
    };
  </script>
</body>

</html>
